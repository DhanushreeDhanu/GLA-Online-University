<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> Student Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 90vh;
      background: #f7f8fa;
      font-family: Arial, sans-serif;
    }

    .login-logo {
      max-width: 580px;
      width: 100%;
    }

    .login-title {
      color: #0f7d33;
      font-weight: 600;
    }

    .login-btn {
      background: #16823a;
      border: none;
      height: 40px;
      font-size: 16px;
    }

    .login-btn:hover {
      background: #0f6d2f;
    }

    .captcha-box {
      width: 300px;
      max-width: 100%;
      height: 55px;
      background: #222;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 15px;
      margin-bottom: 25px;
    }

    .captcha-check {
      width: 25px;
      height: 25px;
      border: 2px solid #aaa;
      border-radius: 3px;
    }

    .help-btn {
      position: fixed;
      right: 14px;
      bottom: 14px;
      background: #336b39;
      color: white;
      border-radius: 100px;
      padding: 10px 18px;
      font-weight: 600;
    }

    @media (max-width: 991px) {
      .left-area {
        text-align: center;
        margin-bottom: 40px;
      }

      .login-logo {
        max-width: 430px;
      }
    }

    @media (max-width: 576px) {
      body {
        background: #fff;
      }

      .login-logo {
        max-width: 300px;
      }

      .login-title {
        font-size: 24px;
      }

      .login-card {
        padding: 0 10px;
      }
    }
  </style>
</head>

<body>

  <div class="container-fluid min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row align-items-center justify-content-center">

        <div class="col-lg-6 left-area">
          <img src="HLI/logo2.jpg" alt="GLA University Online Education" class="login-logo">
        </div>

        <div class="col-lg-5 col-md-8">
          <div class="login-card">

            <p class="mb-1 fw-semibold">Welcome back</p>
            <h2 class="login-title mb-4">Login to your account</h2>

            <form>
              <div class="mb-4">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control form-control-lg" placeholder="Email">
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control form-control-lg" placeholder="Password">
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Role</label>
                <select class="form-select form-select-lg">
                  <option selected>Select Role</option>
                  <option>Student</option>
                  <option>Admin</option>
                  <option>Counsellor</option>
                </select>
              </div>

              <div class="captcha-box">
                <div class="captcha-check"></div>
                <span>Verify you are human</span>
              </div>

              <button type="submit" class="btn btn-success login-btn w-100">
                Login
              </button>

              <a href="#" class="d-block mt-3 text-decoration-none text-dark">
                Forgot Password?
              </a>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="help-btn">ⓘ Help</div>

</body>
</html>
